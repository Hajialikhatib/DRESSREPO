services:
  - type: web
    name: chaudo-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chaudo-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
databases:
  - name: chaudo-db
    plan: free
